# EchoMind 智能客服系统 — Docker Compose 服务编排
# 三级记忆架构：Redis（工作记忆）+ Milvus（知识库 + 情景记忆 + 用户画像）

services:

  # ── Redis 缓存（工作记忆）────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: echomind-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-echomind123}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-echomind123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── etcd（Milvus 元数据存储）──────────────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: echomind-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: >
      etcd --advertise-client-urls http://0.0.0.0:2379
           --listen-client-urls http://0.0.0.0:2379
           --data-dir /etcd
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── MinIO（Milvus 向量数据持久化）─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: echomind-minio
    ports:
      - "9000:9000"      # 对象存储 API
      - "9001:9001"      # Web 控制台
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Milvus 向量数据库 ─────────────────────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: echomind-milvus
    ports:
      - "19530:19530"    # gRPC
      - "9091:9091"      # HTTP 指标
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Attu（Milvus Web 管理界面）────────────────────────────────────────────────
  attu:
    image: zilliz/attu:latest
    container_name: echomind-attu
    ports:
      - "8085:3000"
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      milvus:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echomind-network

  # ── Prometheus 监控 ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: echomind-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── EchoMind 主应用 ─────────────────────────────────────────────────────────
  echomind:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: echomind-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # 容器内固定值，覆盖 .env 中的本地路径
      - REDIS_URL=redis://:${REDIS_PASSWORD:-echomind123}@redis:6379/0
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - EVAL_BASELINE_PATH=/app/data/eval/baseline.json
    volumes:
      - ./data/models:/app/data/models
      - ./data/eval:/app/data/eval
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── Nginx 反向代理 ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: echomind-nginx
    ports:
      - "8084:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      echomind:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── 网络 ────────────────────────────────────────────────────────────────────
networks:
  echomind-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ── 数据卷 ──────────────────────────────────────────────────────────────────
volumes:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
  prometheus-data:
  nginx-logs:
