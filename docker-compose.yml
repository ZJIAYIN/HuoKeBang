# EchoMind 智能客服系统 — Docker Compose 服务编排
# 三级记忆架构：Redis（工作记忆）+ ChromaDB（知识库 + 情景记忆 + 用户画像）

services:

  # ── Redis 缓存（工作记忆）────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: echomind-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-echomind123}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-echomind123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB 向量数据库（知识库 + 记忆）──────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: echomind-chromadb
    ports:
      - "8001:8000"  # 主机8001 → 容器8000，避免与应用端口冲突
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chromadb-data:/chroma/chroma
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── MySQL 数据库（体验券持久化 + Outbox 模式）────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: echomind-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: echomind
      MYSQL_USER: ${MYSQL_USER:-echomind}
      MYSQL_PASSWORD: ${MYSQL_PASS:-echomind123}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init_coupon.sql:/docker-entrypoint-initdb.d/01_init_coupon.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+8:00
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD:-root123} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── RabbitMQ 消息队列（体验券超时检测）───────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: echomind-rabbitmq
    ports:
      - "5672:5672"      # AMQP 协议端口
      - "15672:15672"    # 管理控制台
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-echomind}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-echomind123}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── EchoMind 主应用 ─────────────────────────────────────────────────────────
  echomind:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: echomind-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # 容器内固定值，覆盖 .env 中的本地路径
      - REDIS_URL=redis://:${REDIS_PASSWORD:-echomind123}@redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-echomind}:${RABBITMQ_PASS:-echomind123}@rabbitmq:5672/
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MYSQL_URL=mysql://${MYSQL_USER:-echomind}:${MYSQL_PASS:-echomind123}@mysql:3306/echomind
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── Nginx 反向代理（可选）───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: echomind-nginx
    ports:
      - "8084:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      echomind:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── 网络 ────────────────────────────────────────────────────────────────────
networks:
  echomind-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ── 数据卷 ──────────────────────────────────────────────────────────────────
volumes:
  redis-data:
  chromadb-data:
  mysql-data:
  rabbitmq-data:
  nginx-logs:
