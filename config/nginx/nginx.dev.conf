# EchoMind 本地开发 —— Nginx 反向代理配置
# 与生产配置的区别：
#   上游地址改为 host.docker.internal:8000（指向宿主机 IDEA 启动的服务）
#   去掉了对容器 echomind 的健康检查依赖
#
# 使用方式：
#   1. 取消 docker-compose.dev.yml 中 nginx 部分的注释
#   2. docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d nginx
#   3. 访问 http://localhost:8084

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # 上游服务器 → 宿主机上 IDEA 启动的 EchoMind 进程
    upstream echomind_backend {
        least_conn;
        server host.docker.internal:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    server {
        listen 80;
        server_name localhost;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://echomind_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        location /health {
            proxy_pass http://echomind_backend/health;
            access_log off;
        }

        location /metrics {
            proxy_pass http://echomind_backend/metrics;
            allow 127.0.0.1;
            allow 172.28.0.0/16;
            deny all;
        }

        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /docs {
            proxy_pass http://echomind_backend/docs;
        }

        location /redoc {
            proxy_pass http://echomind_backend/redoc;
        }

        location /openapi.json {
            proxy_pass http://echomind_backend/openapi.json;
        }
    }
}
